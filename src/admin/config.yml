# CMS configuration — the back office / studio for "a quiet room".
# Read by Sveltia CMS (a modern, Decap-compatible editor). This same file
# works with Decap too, so the setup is portable.
#
# Auth: uses a tiny GitHub OAuth proxy (Cloudflare Worker) — see DECAP-SETUP.md.
# base_url below points at it.
backend:
  name: github
  repo: Hazenth1ey/aquietroom
  branch: main
  base_url: https://aquietroom-auth.ivankolly.workers.dev
  auth_endpoint: auth

site_url: https://vermilionhereafter.com
display_url: https://vermilionhereafter.com
logo_url: https://vermilionhereafter.com/favicon.svg

media_folder: "src/uploads"
public_folder: "/uploads"

collections:
  - name: journal
    label: "Journal / Writing"
    label_singular: "Entry"
    description: "Your writing. Create an entry, write, and publish."
    folder: "src/journal/posts"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}  ·  {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Summary (shown in the list & RSS)", name: "description", widget: "string" }
      - { label: "Lede (opening line, optional)", name: "lede", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: pages
    label: "Pages"
    description: "Edit the About and Projects pages."
    files:
      - name: about
        label: "About page"
        file: "src/_data/about.json"
        description: "The About page."
        fields:
          - { label: "Eyebrow (small label)", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Lede (opening line)", name: "lede", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "Links heading", name: "links_heading", widget: "string", required: false }
          - { label: "Links intro", name: "links_intro", widget: "text", required: false }
          - label: "Links"
            name: "links"
            widget: "list"
            required: false
            label_singular: "Link"
            summary: "{{fields.label}} — {{fields.url}}"
            hint: "Add, remove, or reorder links freely — leave empty for none."
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string", hint: "e.g. https://… or mailto:you@example.com" }
              - label: "Icon"
                name: "icon"
                widget: "select"
                default: "link"
                options: ["email", "github", "twitter", "instagram", "linkedin", "facebook", "rss", "link"]
      - name: projects
        label: "Projects page"
        file: "src/_data/projects.json"
        description: "The Projects page."
        fields:
          - { label: "Intro", name: "intro", widget: "text" }
          - label: "Projects"
            name: "items"
            widget: "list"
            label_singular: "Project"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "string", required: false, hint: "e.g. 2026, or leave blank" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Tags", name: "tags", widget: "list", required: false, hint: "e.g. html, css" }
              - { label: "Link (optional)", name: "url", widget: "string", required: false }
