<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Studio — a quiet room</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <!-- Load config from a versioned URL so edge/browser caches can't serve a
       stale copy. Bump ?v= whenever config.yml changes. -->
  <link href="config.yml?v=8" type="text/yaml" rel="cms-config-url" />
  <style>
    /* Dark backdrop so the load-in feels seamless with the site. */
    html, body { margin: 0; height: 100%; background: #08080c; }
  </style>
</head>
<body>
  <!-- Sveltia CMS — a modern, Decap-compatible editor. Reads the same
       config.yml and uses the same GitHub login as before. -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
</body>
</html>
